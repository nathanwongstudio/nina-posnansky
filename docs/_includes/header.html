<header>

  <nav>
    <ul>
      {% assign art_pages = site.pages | where: "layout", "artwork-display" | sort: "nav_order" %}
      {% for item in art_pages %}
        <li class="{% if item.url == page.url %}active{% endif %}">
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </nav>

  <div class="main-title">
    <h1>Nina Posnansky</h1>
    <h3>{{ page.title }}</h3>
  </div>

  <h4 class="subtitle">{{ page.subtitle }}</h4>
</header>
